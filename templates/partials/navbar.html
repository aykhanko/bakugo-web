{% load static %}
<nav class="navbar navbar-expand-lg navbar-dark bg-primary-custom sticky-top shadow-sm">
  <div class="container">
    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'transport:home' %}">
      <div class="brand-icon">
        <i class="bi bi-bus-front-fill"></i>
      </div>
      <span class="brand-text">Baku<span class="brand-accent">Go</span></span>
    </a>

    <!-- Mobile toggler -->
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Nav links -->
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'route_list' %}active{% endif %}"
             href="{% url 'transport:route_list' %}">
            <i class="bi bi-signpost-2 me-1"></i>Routes
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'stop_list' %}active{% endif %}"
             href="{% url 'transport:stop_list' %}">
            <i class="bi bi-geo-alt me-1"></i>Stops
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'route_planner' %}active{% endif %}"
             href="{% url 'transport:route_planner' %}">
            <i class="bi bi-map me-1"></i>Planner
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'map_view' %}active{% endif %}"
             href="{% url 'transport:map_view' %}">
            <i class="bi bi-pin-map me-1"></i>Live Map
          </a>
        </li>
      </ul>

      <!-- Auth buttons -->
      <div class="d-flex align-items-center gap-2">
        {% if user.is_authenticated %}
          <a href="{% url 'accounts:profile' %}" class="nav-link text-white d-flex align-items-center gap-1">
            <i class="bi bi-person-circle"></i>
            <span class="d-none d-lg-inline">{{ user.username }}</span>
          </a>
          <form method="post" action="{% url 'accounts:logout' %}" class="m-0">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">
              <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
          </form>
        {% else %}
          <a href="{% url 'accounts:login' %}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-person me-1"></i>Login
          </a>
          <a href="{% url 'accounts:register' %}" class="btn btn-light btn-sm text-primary fw-semibold">
            <i class="bi bi-person-plus me-1"></i>Register
          </a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
