<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BakuGo – Baku Public Transport{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}BakuGo – Your smart guide to public transport in Baku. Find routes, stops, and real-time bus locations.{% endblock %}">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  {% load static %}
  <link href="{% static 'css/main.css' %}" rel="stylesheet">
  {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

  {% include 'partials/navbar.html' %}

  {% if messages %}
  <div class="container mt-3">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
      <i class="bi bi-{% if message.tags == 'success' %}check-circle{% elif message.tags == 'error' or message.tags == 'danger' %}exclamation-circle{% elif message.tags == 'warning' %}exclamation-triangle{% else %}info-circle{% endif %} me-2"></i>
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <main class="flex-grow-1">
    {% block content %}{% endblock %}
  </main>

  {% include 'partials/footer.html' %}

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}

  <!-- Language switcher -->
  <script>
  (function () {
    var KEY = 'bakugo_lang';
    var lang = localStorage.getItem(KEY) || 'en';

    function applyLang(l) {
      document.documentElement.setAttribute('lang', l);
      /* translate all elements that carry data-en / data-az */
      document.querySelectorAll('[data-en][data-az]').forEach(function (el) {
        var val = el.getAttribute('data-' + l);
        if (val !== null) el.innerHTML = val;
      });
      /* sync placeholder text */
      document.querySelectorAll('[data-placeholder-en][data-placeholder-az]').forEach(function (el) {
        var val = el.getAttribute('data-placeholder-' + l);
        if (val !== null) el.placeholder = val;
      });
      /* sync form labels stored on <label> via data-for-* */
      document.querySelectorAll('.lang-btn').forEach(function (btn) {
        btn.classList.toggle('lang-active', btn.dataset.lang === l);
      });
    }

    window.setLang = function (l) {
      localStorage.setItem(KEY, l);
      applyLang(l);
    };

    document.addEventListener('DOMContentLoaded', function () { applyLang(lang); });
  })();
  </script>
</body>
</html>
